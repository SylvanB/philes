<html>
    <head>
        <script src="main.js"></script>
    </head>
    <body>
        <h1>.: Phile Hosting :.</h1>
        <h2>API Overview:</h2>
        <p><code>GET /file/[id]</code> returns the image with the matching id.</p>
        <p><code>POST /upload</code> will allow you to upload PNG/JPEG files. Returns the ID for the file.</p>
        <form id="uploadForm" action="/file/upload" method="post", enctype="multipart/form-data">
            <input type="file" id="file" name="file">
            <input type="submit" value="Upload" id="submit" name="submit">
        </form> 
    </body>
</html>
